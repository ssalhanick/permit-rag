services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: permit_rag_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: permit_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init/01_extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init/02_roles.sql:/docker-entrypoint-initdb.d/02-roles.sql:ro

  # ── Neo4j Community Edition (Task 16A) ──────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: permit_rag_neo4j
    restart: unless-stopped
    environment:
      # Initial password — rotate before any shared deployment.
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/localdev123}
      # Enable APOC plugin (Community edition ships APOC Core).
      NEO4J_PLUGINS: '["apoc"]'
      # Allow APOC procedures to call external endpoints (needed for future
      # graph-import jobs from the permit corpus).
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
      NEO4J_dbms_security_procedures_allowlist: "apoc.*"
    ports:
      # Browser UI
      - "7474:7474"
      # Bolt protocol (used by graph_client.py)
      - "7687:7687"
    volumes:
      - neo4jdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  pgdata:
  neo4jdata:
