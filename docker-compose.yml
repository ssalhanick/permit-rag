services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: permit_rag_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: permit_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdev}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init/01_extensions.sql:/docker-entrypoint-initdb.d/00-extensions.sql:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/init/02_roles.sql:/docker-entrypoint-initdb.d/02-roles.sql:ro

volumes:
  pgdata:
